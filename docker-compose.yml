services:
  kbs:
    build:
      context: ./service
      dockerfile: Dockerfile
    container_name: kbs
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - KBS_QDRANT_URL=http://qdrant:6333
      - KBS_QDRANT_API_KEY=${QDRANT_API_KEY}
      - KBS_DEFAULT_API_KEY=${EMBEDDER_API_KEY}
      - KBS_DEFAULT_EMBEDDER_URL=${EMBEDDER_URL}
      - KBS_DEFAULT_EMBEDDER_MODEL=${EMBEDDER_MODEL}
      - KBS_DEFAULT_EMBEDDER_DIM=${EMBEDDER_DIM:-0}
      - KBS_JWT_SECRET=${JWT_SECRET}
      - KBS_LOG_LEVEL=${LOG_LEVEL:-INFO}
      - KBS_DEFAULT_QUOTA_KB=${DEFAULT_QUOTA_KB:-16384}
      - KBS_COLLECTION_PREFIX=${COLLECTION_PREFIX:-emb_}
      - KBS_UVICORN_TIMEOUT_KEEP_ALIVE=600
      - KBS_LEGACY_QUERY_URL=${LEGACY_QUERY_URL:-}
      - KBS_LEGACY_PROXY_TIMEOUT=${LEGACY_PROXY_TIMEOUT:-30.0}
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/kb/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    networks:
      - kbs_net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      # gRPC не пробрасываем - "6334:6334"
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    volumes:
      - qdrant_storage:/qdrant/storage
      - ./qdrant/config/config.yaml:/qdrant/config/config.yaml:ro
      - ./qdrant/healthcheck.pl:/app/scripts/qdrant-healthcheck.pl:ro
    healthcheck:
      test: ["CMD", "perl", "/app/scripts/qdrant-healthcheck.pl"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 30s
    restart: unless-stopped
    networks:
      - kbs_net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - kbs_net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - kbs_net

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - kbs_net

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - promtail_positions:/var/lib/promtail
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - kbs_net

volumes:
  qdrant_storage:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_positions:

networks:
  kbs_net:
    driver: bridge
